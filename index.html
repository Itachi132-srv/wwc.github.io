<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bike Racing Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; touch-action: none; font-family: sans-serif; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .btn { 
            position: absolute; bottom: 40px; width: 90px; height: 90px; 
            border-radius: 50%; background: rgba(0,0,0,0.6); border: 4px solid #fff;
            pointer-events: auto; display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 14px; user-select: none;
        }
        #btn-brake { left: 30px; border-color: #ff4444; }
        #btn-gas { right: 30px; border-color: #44ff44; }
        #speedo { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-size: 26px; font-weight: bold; text-shadow: 2px 2px 8px #000; }
    </style>
</head>
<body>

<div id="ui">
    <div id="speedo">0 KM/H</div>
    <div id="btn-brake" class="btn">BRAKE</div>
    <div id="btn-gas" class="btn">GAS</div>
</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
    import { OBJLoader } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/loaders/OBJLoader.js';
    import { MTLLoader } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/loaders/MTLLoader.js';

    let scene, camera, renderer, player;
    let roads = [], trees = [], fences = [];
    let speed = 0, maxSpeed = 2.0;
    let isGas = false, isBrake = false, tiltX = 0;

    // 1. Scene Setup
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 40, 200);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.2)); 
    const sun = new THREE.DirectionalLight(0xffffff, 1.0);
    sun.position.set(10, 30, 10);
    scene.add(sun);

    const mtlLoader = new MTLLoader();
    const objLoader = new OBJLoader();

    // 2. Load Models
    function loadModel(mtl, obj, callback) {
        mtlLoader.load(mtl, (materials) => {
            materials.preload();
            objLoader.setMaterials(materials).load(obj, callback);
        });
    }

    // Road Logic (road.obj)
    loadModel('road.mtl', 'road.obj', (obj) => {
        for(let i = 0; i < 5; i++) {
            let r = obj.clone();
            r.position.z = -i * 60; // Road length 60 assume ki hai
            scene.add(r);
            roads.push(r);
        }
    });

    // Fence Fix (white1.obj) - Rotation Fixed
    loadModel('white1.mtl', 'white1.obj', (obj) => {
        for(let i = 0; i < 15; i++) {
            let fl = obj.clone();
            fl.rotation.y = Math.PI / 2; // parallel to road
            fl.position.set(-6.5, 0, -i * 15);
            scene.add(fl);
            fences.push(fl);

            let fr = obj.clone();
            fr.rotation.y = Math.PI / 2;
            fr.position.set(6.5, 0, -i * 15);
            scene.add(fr);
            fences.push(fr);
        }
    });

    // Trees (tree.obj)
    loadModel('tree.mtl', 'tree.obj', (obj) => {
        for(let i = 0; i < 15; i++) {
            let tl = obj.clone(); tl.position.set(-15, 0, -i * 25); scene.add(tl); trees.push(tl);
            let tr = obj.clone(); tr.position.set(15, 0, -i * 25); scene.add(tr); trees.push(tr);
        }
    });

    // Bike (car1.obj)
    loadModel('car1.mtl', 'car1.obj', (obj) => {
        player = obj;
        player.scale.set(0.18, 0.18, 0.18);
        scene.add(player);
    });

    // 3. Controls (Mobile + PC)
    const btnGas = document.getElementById('btn-gas');
    const btnBrake = document.getElementById('btn-brake');

    btnGas.onpointerdown = () => isGas = true;
    btnGas.onpointerup = () => isGas = false;
    btnBrake.onpointerdown = () => isBrake = true;
    btnBrake.onpointerup = () => isBrake = false;

    window.addEventListener('deviceorientation', (e) => {
        tiltX = e.gamma / 25; 
    });

    // 4. Game Loop
    function animate() {
        requestAnimationFrame(animate);

        // Physics
        if (isGas) speed = THREE.MathUtils.lerp(speed, maxSpeed, 0.02);
        else speed = THREE.MathUtils.lerp(speed, 0, 0.01);
        if (isBrake) speed = THREE.MathUtils.lerp(speed, 0, 0.1);

        document.getElementById('speedo').innerText = `${Math.floor(speed * 120)} KM/H`;

        // Movement
        [...roads, ...fences, ...trees].forEach(o => {
            o.position.z += speed;
            if (o.position.z > 50) o.position.z -= 250; 
        });

        if (player) {
            player.position.x += tiltX * 0.3;
            // Boundary Check
            if (player.position.x > 6) player.position.x = 6;
            if (player.position.x < -6) player.position.x = -6;
            
            player.rotation.z = -tiltX * 0.4; // Lean animation

            // FPS Camera (Handlebar level)
            camera.position.set(player.position.x, 1.8, 1.3);
            camera.lookAt(player.position.x, 0.8, -10);
        }

        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
