<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bike Pro Max - Custom Models</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: sans-serif; touch-action: none; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .btn { 
            position: absolute; bottom: 40px; width: 90px; height: 90px; 
            border-radius: 50%; background: rgba(0,0,0,0.5); border: 3px solid #fff;
            pointer-events: auto; display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; -webkit-user-select: none;
        }
        #btn-brake { left: 30px; border-color: #ff4444; }
        #btn-gas { right: 30px; border-color: #44ff44; }
        #dashboard { position: absolute; top: 20px; width: 100%; text-align: center; color: white; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>

<div id="ui">
    <div id="dashboard">
        <h2 id="speed-text">0 KM/H</h2>
    </div>
    <div id="btn-brake" class="btn">BRAKE</div>
    <div id="btn-gas" class="btn">GAS</div>
</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
    import { OBJLoader } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/loaders/OBJLoader.js';
    import { MTLLoader } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/loaders/MTLLoader.js';

    let scene, camera, renderer, player;
    let roads = [], trees = [], fences = [];
    let speed = 0, maxSpeed = 2.0;
    let isGas = false, isBrake = false, tiltX = 0;

    // 1. Setup
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 40, 180);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(10, 20, 10);
    scene.add(light);

    const loader = new OBJLoader();
    const mtlLoader = new MTLLoader();

    // 2. Load Models Logic
    function loadModel(mtlName, objName, callback) {
        mtlLoader.load(mtlName, (materials) => {
            materials.preload();
            loader.setMaterials(materials).load(objName, callback);
        });
    }

    // --- Road Loading (road.obj) ---
    loadModel('road.mtl', 'road.obj', (obj) => {
        for(let i = 0; i < 3; i++) {
            let r = obj.clone();
            r.position.z = -i * 100; // Road length 100 assume kar raha hoon
            scene.add(r);
            roads.push(r);
        }
    });

    // --- Fences (white1.obj) ---
    loadModel('white1.mtl', 'white1.obj', (obj) => {
        for(let i = 0; i < 6; i++) {
            let fl = obj.clone(); fl.position.set(-8, 0, -i * 40); scene.add(fl); fences.push(fl);
            let fr = obj.clone(); fr.position.set(8, 0, -i * 40); scene.add(fr); fences.push(fr);
        }
    });

    // --- Trees (tree.obj) ---
    loadModel('tree.mtl', 'tree.obj', (obj) => {
        for(let i = 0; i < 10; i++) {
            let tl = obj.clone(); tl.position.set(-15, 0, -i * 30); scene.add(tl); trees.push(tl);
            let tr = obj.clone(); tr.position.set(15, 0, -i * 30); scene.add(tr); trees.push(tr);
        }
    });

    // --- Bike (car1.obj) ---
    loadModel('car1.mtl', 'car1.obj', (obj) => {
        player = obj;
        player.scale.set(0.2, 0.2, 0.2);
        scene.add(player);
    });

    // 3. Controls
    document.getElementById('btn-gas').ontouchstart = () => isGas = true;
    document.getElementById('btn-gas').ontouchend = () => isGas = false;
    document.getElementById('btn-brake').ontouchstart = () => isBrake = true;
    document.getElementById('btn-brake').ontouchend = () => isBrake = false;

    window.addEventListener('deviceorientation', (e) => {
        tiltX = e.gamma / 25; 
    });

    // 4. Game Loop
    function animate() {
        requestAnimationFrame(animate);

        // Speed calculation
        if (isGas) speed = THREE.MathUtils.lerp(speed, maxSpeed, 0.03);
        else speed = THREE.MathUtils.lerp(speed, 0, 0.01);
        if (isBrake) speed = THREE.MathUtils.lerp(speed, 0, 0.1);

        document.getElementById('speed-text').innerText = `${Math.floor(speed * 120)} KM/H`;

        // Movement Logic (Everything moves towards player)
        [...roads, ...fences, ...trees].forEach(obj => {
            obj.position.z += speed;
            if (obj.position.z > 50) obj.position.z -= 250; // Reset position for infinite loop
        });

        if (player) {
            // Steering
            player.position.x += tiltX * 0.3;
            if (player.position.x > 7) player.position.x = 7;
            if (player.position.x < -7) player.position.x = -7;
            player.rotation.z = -tiltX * 0.4; // Lean effect

            // FPS Camera (Handlebar View)
            camera.position.set(player.position.x, 1.7, 1.2);
            camera.lookAt(player.position.x, 1, -10);
        }

        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
