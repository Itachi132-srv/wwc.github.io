<!DOCTYPE html>
<html>
<head>
<title>Simple Cricket Game</title>
<style>
body{
    text-align:center;
    font-family:Arial;
    background:#1e90ff;
    color:white;
}
button{
    padding:10px 20px;
    font-size:18px;
    margin-top:20px;
}
#score{
    font-size:24px;
    margin-top:20px;
}
</style>
</head>

<body>

<h1>🏏 Simple Cricket Game</h1>
<p>Click HIT to play!</p>

<button onclick="play()">HIT</button>

<div id="result"></div>
<div id="score">Score: 0</div>

<script>
let score = 0;

function play(){
    let player = Math.floor(Math.random()*7); 
    let computer = Math.floor(Math.random()*7);

    if(player === computer){
        document.getElementById("result").innerHTML =
        "You chose " + player + " | Bowler chose " + computer + " → OUT! ❌";
        score = 0;
    }else{
        score += player;
        document.getElementById("result").innerHTML =
        "You scored " + player + " runs 🏏";
    }

    document.getElementById("score").innerHTML = "Score: " + score;
}
</script>

</body>
</html>
