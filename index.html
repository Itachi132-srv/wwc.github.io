<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bike Racing FPP</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; touch-action: none; font-family: sans-serif; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .btn { 
            position: absolute; bottom: 35px; width: 85px; height: 85px; 
            border-radius: 50%; background: rgba(0,0,0,0.6); border: 3px solid #fff;
            pointer-events: auto; display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; user-select: none;
        }
        #btn-brake { left: 25px; border-color: #ff4444; }
        #btn-gas { right: 25px; border-color: #44ff44; }
        #speedo { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>

<div id="ui">
    <div id="speedo">0 KM/H</div>
    <div id="btn-brake" class="btn">BRAKE</div>
    <div id="btn-gas" class="btn">GAS</div>
</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
    import { OBJLoader } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/loaders/OBJLoader.js';
    import { MTLLoader } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/loaders/MTLLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 60, 220);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.6));
    const sun = new THREE.DirectionalLight(0xffffff, 1.0);
    sun.position.set(10, 50, 20);
    scene.add(sun);

    // --- ROAD SETUP ---
    const roadWidth = 14;
    const roadGroup = new THREE.Group();
    const roadGeo = new THREE.PlaneGeometry(roadWidth, 1000);
    const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    roadGroup.add(road);

    const lineGeo = new THREE.PlaneGeometry(0.5, 1000);
    const lineMat = new THREE.MeshBasicMaterial({ color: 0xFFFF00 });
    const line = new THREE.Mesh(lineGeo, lineMat);
    line.rotation.x = -Math.PI / 2;
    line.position.y = 0.05;
    roadGroup.add(line);
    scene.add(roadGroup);

    // --- LOADING ---
    let player, fences = [], trees = [];
    const mtlLoader = new MTLLoader();
    const objLoader = new OBJLoader();

    function load(mtl, obj, cb) {
        mtlLoader.load(mtl, (m) => {
            m.preload();
            objLoader.setMaterials(m).load(obj, cb);
        });
    }

    load('car1.mtl', 'car1.obj', (o) => {
        player = o;
        player.scale.set(0.18, 0.18, 0.18);
        scene.add(player);
    });

    load('white1.mtl', 'white1.obj', (o) => {
        const gap = 8.5;
        for(let i=0; i<50; i++) {
            let fl = o.clone(); fl.rotation.y = Math.PI/2; fl.position.set(-roadWidth/2, 0, -i*gap); scene.add(fl); fences.push(fl);
            let fr = o.clone(); fr.rotation.y = Math.PI/2; fr.position.set(roadWidth/2, 0, -i*gap); scene.add(fr); fences.push(fr);
        }
    });

    load('tree.mtl', 'tree.obj', (o) => {
        for(let i=0; i<20; i++) {
            let tl = o.clone(); tl.position.set(-18, 0, -i*35); scene.add(tl); trees.push(tl);
            let tr = o.clone(); tr.position.set(18, 0, -i*35); scene.add(tr); trees.push(tr);
        }
    });

    // --- CONTROLS ---
    let speed = 0, isGas = false, isBrake = false, tilt = 0;
    document.getElementById('btn-gas').onpointerdown = () => isGas = true;
    document.getElementById('btn-gas').onpointerup = () => isGas = false;
    document.getElementById('btn-brake').onpointerdown = () => isBrake = true;
    document.getElementById('btn-brake').onpointerup = () => isBrake = false;
    window.addEventListener('deviceorientation', (e) => tilt = e.gamma / 20);

    function animate() {
        requestAnimationFrame(animate);
        if(isGas) speed = Math.min(speed + 0.015, 2.2);
        else speed = Math.max(speed - 0.005, 0);
        if(isBrake) speed = Math.max(speed - 0.08, 0);

        document.getElementById('speedo').innerText = Math.floor(speed * 100) + " KM/H";

        [...fences, ...trees].forEach(o => {
            o.position.z += speed;
            if(o.position.z > 30) o.position.z -= 450;
        });

        if(player) {
            player.position.x += tilt * 0.4;
            if(player.position.x > 6.2) player.position.x = 6.2;
            if(player.position.x < -6.2) player.position.x = -6.2;
            player.rotation.z = -tilt * 0.4;
            
            // FPP VIEW (Handle dikhega)
            // Camera bike ke handle ke thoda peeche aur upar set kiya hai
            camera.position.set(player.position.x, 1.4, 0.8); 
            camera.lookAt(player.position.x, 0.8, -15);
        } else {
            camera.position.set(0, 5, 12);
            camera.lookAt(0, 0, 0);
        }
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
