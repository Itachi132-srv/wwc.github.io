<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket League Pro: Ultimate</title>
    <style>
        :root { --primary: #f1c40f; --accent: #e74c3c; }
        body { margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Arial Black', sans-serif; overflow: hidden; color: white; }
        
        #hud { position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between; z-index: 10; pointer-events: none; }
        .stat-box { background: rgba(0,0,0,0.7); padding: 10px 20px; border-left: 5px solid var(--primary); border-radius: 4px; }
        
        #msg-overlay { position: absolute; top: 40%; font-size: 3rem; text-transform: uppercase; font-style: italic; text-shadow: 0 0 20px rgba(241, 196, 15, 0.8); pointer-events: none; opacity: 0; transition: 0.2s; z-index: 20; }
        
        canvas { background: #27ae60; cursor: pointer; box-shadow: 0 0 100px rgba(0,0,0,0.5); border-bottom: 10px solid #1e8449; }
        
        .instructions { position: absolute; bottom: 20px; color: rgba(255,255,255,0.5); font-size: 0.8rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="stat-box">
            <div style="font-size: 0.7rem; color: #aaa;">SCORE</div>
            <div id="scoreDisplay">00 - 0</div>
        </div>
        <div class="stat-box">
            <div style="font-size: 0.7rem; color: #aaa;">BALLS</div>
            <div id="ballDisplay">0.0</div>
        </div>
    </div>

    <div id="msg-overlay">SIXER!</div>

    <canvas id="cricketCanvas"></canvas>

    <div class="instructions">TAP ANYWHERE TO SWING THE BAT</div>

    <script>
        const canvas = document.getElementById('cricketCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const ballDisplay = document.getElementById('ballDisplay');
        const msgOverlay = document.getElementById('msg-overlay');

        // Layout settings
        function resize() {
            canvas.width = Math.min(window.innerWidth, 500);
            canvas.height = Math.min(window.innerHeight, 800);
        }
        window.onresize = resize;
        resize();

        // Game State
        let score = 0, wickets = 0, balls = 0;
        let isBowling = false;
        let swingFrame = 0; // Animation for the bat
        let ball = { x: canvas.width/2, y: 150, z: 0, speed: 0.02, active: false, hit: false };

        function showMessage(text, color = "#f1c40f") {
            msgOverlay.innerText = text;
            msgOverlay.style.color = color;
            msgOverlay.style.opacity = "1";
            msgOverlay.style.transform = "scale(1.2)";
            setTimeout(() => { 
                msgOverlay.style.opacity = "0"; 
                msgOverlay.style.transform = "scale(1)";
            }, 1000);
        }

        function drawStadium() {
            // Sky & Crowd
            const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGrad.addColorStop(0, '#2980b9');
            skyGrad.addColorStop(0.4, '#6dd5fa');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Ground Perspective
            ctx.fillStyle = '#2ecc71';
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            ctx.lineTo(canvas.width, canvas.height);
            ctx.lineTo(canvas.width * 0.8, canvas.height * 0.3);
            ctx.lineTo(canvas.width * 0.2, canvas.height * 0.3);
            ctx.fill();

            // Pitch
            ctx.fillStyle = '#edc9af';
            ctx.beginPath();
            ctx.moveTo(canvas.width * 0.35, canvas.height * 0.3);
            ctx.lineTo(canvas.width * 0.65, canvas.height * 0.3);
            ctx.lineTo(canvas.width * 0.85, canvas.height);
            ctx.lineTo(canvas.width * 0.15, canvas.height);
            ctx.fill();

            // Wickets (Stumps)
            ctx.fillStyle = '#fff';
            for(let i = -1; i <= 1; i++) {
                ctx.fillRect(canvas.width/2 + (i*10) - 2, canvas.height - 120, 4, 80);
            }
        }

        function drawBat() {
            ctx.save();
            ctx.translate(canvas.width/2 + 40, canvas.height - 100);
            
            // Swing animation logic
            if (swingFrame > 0) {
                ctx.rotate(-Math.PI / 2 * (swingFrame / 10));
                swingFrame--;
            }

            // Batting Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(-10, 10, 20, 100);

            // Bat body
            ctx.fillStyle = '#5d4037';
            ctx.fillRect(-12, -20, 24, 110);
            ctx.fillStyle = '#222'; // Grip
            ctx.fillRect(-6, -60, 12, 40);
            
            ctx.restore();
        }

        function updateBall() {
            if (!ball.active) {
                if (Math.random() < 0.02) {
                    ball.active = true;
                    ball.z = 0;
                    ball.hit = false;
                    ball.x = (canvas.width / 2) + (Math.random() * 40 - 20);
                }
                return;
            }

            if (!ball.hit) {
                ball.z += ball.speed;
                // Calculate perspective Y
                ball.y = 200 + (ball.z * 500);
                
                // Ball size increases as it gets closer
                let size = 4 + (ball.z * 25);

                // Draw Ball
                ctx.fillStyle = '#c0392b';
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, size, 0, Math.PI*2);
                ctx.fill();

                // Check for Clean Bowled
                if (ball.z > 0.95 && !ball.hit) {
                    if (ball.z > 1.1) {
                        ball.active = false;
                        wickets++;
                        balls++;
                        showMessage("OUT!", "#e74c3c");
                        updateStats();
                    }
                }
            } else {
                // Ball fly away animation
                ball.y -= 15;
                ball.z -= 0.02;
                ctx.fillStyle = '#c0392b';
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, 15, 0, Math.PI*2);
                ctx.fill();
                if (ball.y < -50) ball.active = false;
            }
        }

        function swing() {
            if (swingFrame > 0) return;
            swingFrame = 15;

            // Hit detection logic (z = 0.85 to 0.95 is the sweet spot)
            if (ball.active && !ball.hit && ball.z > 0.75 && ball.z < 1.0) {
                ball.hit = true;
                balls++;
                let runs = 1;
                if (ball.z > 0.88 && ball.z < 0.94) {
                    runs = 6;
                    showMessage("BIG SIX!");
                } else if (ball.z > 0.82) {
                    runs = 4;
                    showMessage("FOUR!");
                } else {
                    showMessage("SINGLE");
                }
                score += runs;
                updateStats();
            }
        }

        function updateStats() {
            scoreDisplay.innerText = `${score} - ${wickets}`;
            const overs = Math.floor(balls / 6);
            const remainder = balls % 6;
            ballDisplay.innerText = `${overs}.${remainder}`;
        }

        function gameLoop() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            drawStadium();
            updateBall();
            drawBat();
            requestAnimationFrame(gameLoop);
        }

        canvas.addEventListener('mousedown', swing);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); swing(); });

        gameLoop();
    </script>
</body>
</html>
