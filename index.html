<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Endless Road Bike Game</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="instructions">Use A/D or Left/Right arrows to move</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
    import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/loaders/GLTFLoader.js';

    // 1. Scene Setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb); // Sky blue
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 2. Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(0, 10, 5);
    scene.add(dirLight);

    // 3. The Road (Endless Logic)
    const roadGeometry = new THREE.PlaneGeometry(10, 100);
    const roadMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });
    
    const road1 = new THREE.Mesh(roadGeometry, roadMaterial);
    road1.rotation.x = -Math.PI / 2;
    scene.add(road1);

    const road2 = road1.clone();
    road2.position.z = -100;
    scene.add(road2);

    // 4. Load your Model (car1)
    let player;
    const loader = new GLTFLoader();
    
    // Yahan car1.glb aapki file ka naam hona chahiye
    loader.load('car1.glb', (gltf) => {
        player = gltf.scene;
        player.scale.set(0.5, 0.5, 0.5); // Size adjust karein
        player.position.y = 0.5;
        scene.add(player);
    }, undefined, (error) => {
        console.error("Model load nahi hua, check karein car1.glb same folder me hai ya nahi.");
        // Placeholder agar model na mile
        const geo = new THREE.BoxGeometry(1, 1, 2);
        const mat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        player = new THREE.Mesh(geo, mat);
        player.position.y = 0.5;
        scene.add(player);
    });

    camera.position.set(0, 3, 7);
    camera.lookAt(0, 0, 0);

    // 5. Movement Logic
    let moveLeft = false;
    let moveRight = false;

    window.addEventListener('keydown', (e) => {
        if (e.key === 'a' || e.key === 'ArrowLeft') moveLeft = true;
        if (e.key === 'd' || e.key === 'ArrowRight') moveRight = true;
    });
    window.addEventListener('keyup', (e) => {
        if (e.key === 'a' || e.key === 'ArrowLeft') moveLeft = false;
        if (e.key === 'd' || e.key === 'ArrowRight') moveRight = false;
    });

    // 6. Animation Loop
    const speed = 0.5;
    function animate() {
        requestAnimationFrame(animate);

        // Road Movement
        road1.position.z += speed;
        road2.position.z += speed;

        if (road1.position.z > 50) road1.position.z = road2.position.z - 100;
        if (road2.position.z > 50) road2.position.z = road1.position.z - 100;

        // Player movement
        if (player) {
            if (moveLeft && player.position.x > -4) player.position.x -= 0.1;
            if (moveRight && player.position.x < 4) player.position.x += 0.1;
        }

        renderer.render(scene, camera);
    }
    animate();

    // Resize handling
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
